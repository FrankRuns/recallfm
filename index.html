<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>recallfm — primer</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0a; color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    height: 100vh; width: 100vw; overflow: hidden;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  h1 { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; margin: 0 0 48px; font-weight: 400; }
  .status { font-size: 28px; line-height: 1.3; min-height: 120px; max-width: 500px; }
  .status.listening { color: #4ade80; }
  .status.error { color: #f87171; }
  button {
    margin-top: 48px;
    background: #e8e8e8; color: #0a0a0a;
    border: none; border-radius: 999px;
    padding: 20px 48px;
    font-size: 18px; font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.3; }
  .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #4ade80; margin-right: 12px; vertical-align: middle; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .progress { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 12px; opacity: 0.4; letter-spacing: 2px; }
  input[type="email"] {
    margin-top: 24px;
    background: #1a1a1a; color: #e8e8e8;
    border: 1px solid #333; border-radius: 12px;
    padding: 16px 20px; font-size: 18px;
    width: 100%; max-width: 360px;
    -webkit-appearance: none;
  }
</style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <h1>recallfm</h1>
  <div class="status" id="status">Tap start. Put your phone in your pocket. Answer out loud.</div>
  <button id="action" onclick="onAction()">Start</button>

<script>
// ---------- Quiz data ----------
const PRIMER = [
  {
    id: "p1",
    text: "Question one. When AI gets better at doing knowledge work, what do you expect happens to the number of humans employed at AI-forward companies? Say A for drops sharply. Say B for drops slightly. Say C for stays flat. Say D for grows.",
    options: ["A", "B", "C", "D"],
  },
  {
    id: "p2",
    text: "Question two. Where will most professional work happen in a year? Say A for a traditional SaaS app with AI features. Say B for a chat interface like ChatGPT. Say C for a coding agent environment like Codex or Claude Code. Say D for the command line.",
    options: ["A", "B", "C", "D"],
  },
  {
    id: "p3",
    text: "Question three. What's the biggest risk to a SaaS company in the AI era? Say A for AI agents replace SaaS entirely. Say B for margins crushed by token costs. Say C for users will demand AI features they can't afford to build. Say D for nothing major, SaaS will thrive.",
    options: ["A", "B", "C", "D"],
  },
];

// ---------- State ----------
let phase = "idle"; // idle | running | done | email
let qIdx = 0;
const answers = [];

// ---------- Audio (browser TTS for now; swap to ElevenLabs MP3s later) ----------
function speak(text) {
  return new Promise((resolve) => {
    // Cancel anything in progress
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.0;
    u.pitch = 1.0;
    u.onend = resolve;
    u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

// ---------- Speech recognition ----------
function listen() {
  return new Promise((resolve, reject) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      reject(new Error("Speech recognition not supported on this browser. Use Safari on iPhone or Chrome on desktop."));
      return;
    }
    const rec = new SR();
    rec.lang = "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 3;
    rec.continuous = false;

    let resolved = false;
    rec.onresult = (e) => {
      if (resolved) return;
      const transcripts = [];
      for (let i = 0; i < e.results[0].length; i++) {
        transcripts.push(e.results[0][i].transcript.trim().toUpperCase());
      }
      // Look for A/B/C/D in any alternative
      const letter = findLetter(transcripts);
      resolved = true;
      resolve({ letter, raw: transcripts });
    };
    rec.onerror = (e) => {
      if (resolved) return;
      resolved = true;
      reject(new Error("rec error: " + e.error));
    };
    rec.onend = () => {
      if (!resolved) {
        resolved = true;
        resolve({ letter: null, raw: [] });
      }
    };
    rec.start();
  });
}

function findLetter(transcripts) {
  // Handle "A", "B", "ay", "bee", "see", "sea", "dee", "the", etc.
  const map = {
    A: ["A", "AY", "EH"],
    B: ["B", "BE", "BEE", "BEA"],
    C: ["C", "SEE", "SEA", "CEE"],
    D: ["D", "DE", "DEE", "THE"],
  };
  for (const t of transcripts) {
    const words = t.split(/\s+/);
    for (const w of words) {
      for (const [letter, variants] of Object.entries(map)) {
        if (variants.includes(w)) return letter;
      }
    }
  }
  return null;
}

// ---------- UI ----------
const $status = document.getElementById("status");
const $action = document.getElementById("action");
const $progress = document.getElementById("progress");

function setStatus(text, cls = "") {
  $status.textContent = text;
  $status.className = "status " + cls;
}

function setProgress(text) {
  $progress.textContent = text;
}

// ---------- Main flow ----------
async function onAction() {
  if (phase === "idle") {
    phase = "running";
    $action.style.display = "none";
    await runQuiz();
  } else if (phase === "email") {
    submitEmail();
  }
}

async function runQuiz() {
  // Unlock speech synthesis on iOS (needs a user gesture, which we just had)
  await speak("");

  await speak("Primer. Three questions. After each one, say A, B, C, or D out loud.");

  for (qIdx = 0; qIdx < PRIMER.length; qIdx++) {
    setProgress(`${qIdx + 1} / ${PRIMER.length}`);
    const q = PRIMER[qIdx];
    setStatus(`Question ${qIdx + 1}…`);
    await speak(q.text);

    // Listen with up to 2 retries
    let answer = null;
    for (let attempt = 0; attempt < 3 && !answer; attempt++) {
      setStatus("Listening…", "listening");
      try {
        const result = await listen();
        if (result.letter) {
          answer = result.letter;
        } else if (attempt < 2) {
          await speak("Sorry, didn't catch that. Try again. Just say A, B, C, or D.");
        }
      } catch (err) {
        setStatus("Speech recognition failed: " + err.message, "error");
        return;
      }
    }

    if (!answer) {
      await speak("Skipping. Moving on.");
      answers.push({ id: q.id, answer: null });
    } else {
      answers.push({ id: q.id, answer });
      await speak(`Got it. ${answer}.`);
    }
  }

  // Done with primer
  setProgress("");
  phase = "email";
  setStatus("Now go listen to the episode. When you finish, come back here and enter your email to schedule the followup quizzes.");
  $action.textContent = "Enter email";
  $action.style.display = "inline-block";

  await speak("Primer done. Now go listen to the Dan Shipper episode on Lenny's podcast. When you finish listening, come back to this page and enter your email so we can schedule the followup quizzes.");
}

function submitEmail() {
  // Show email input
  if (!document.getElementById("email")) {
    const input = document.createElement("input");
    input.type = "email";
    input.id = "email";
    input.placeholder = "you@example.com";
    input.autocomplete = "email";
    document.body.insertBefore(input, $action);
    $action.textContent = "Schedule quizzes";
    input.focus();
    return;
  }
  const email = document.getElementById("email").value.trim();
  if (!email || !email.includes("@")) {
    setStatus("Need a real email.", "error");
    return;
  }
  // POST to server (stub for now — we'll wire this up next)
  const payload = { email, primerAnswers: answers, ts: Date.now() };
  console.log("Would POST to /start:", payload);
  setStatus("Saved. Check your email after you finish the episode and tap the link.");
  $action.style.display = "none";
  document.getElementById("email").style.display = "none";
}
</script>
</body>
</html>
